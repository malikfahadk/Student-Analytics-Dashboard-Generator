server {
    # Cloud Run dynamically assigns a port via the PORT environment variable.
    # Nginx 1.19+ will automatically replace ${PORT} with the environment variable on startup.
    listen ${PORT};
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html index.htm;

    # Gzip compression for faster loading
    gzip on;
    gzip_vary on;
    gzip_min_length 10240;
    gzip_proxied expired no-cache no-store private auth;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml application/javascript;
    gzip_disable "MSIE [1-6]\.";

    # Support for React Router
    # Any route that doesn't map to a file will serve index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets to reduce Cloud Run egress costs
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg)$ {
        expires 1y;
        add_header Cache-Control "public, no-transform";
    }

    # Error handling
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
